<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ code }} — Ask NASA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/chat.css') }}" rel="stylesheet">
</head>
<body>
  <div class="chat-app" style="justify-content: center; align-items: center;">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h2>{{ code }}</h2>
      <p>{{ message }}</p>
      <a href="/" class="suggestion" style="display: inline-block; margin-top: 1rem;">Go Home</a>
    </div>
  </div>
</body>
</html>
