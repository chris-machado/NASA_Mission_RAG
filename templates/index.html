<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask NASA — AI Mission Report Assistant</title>
  <meta name="description" content="Ask questions about NASA missions using AI-powered search over official mission reports.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/chat.css') }}" rel="stylesheet">
</head>
<body>
  <div class="chat-app">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-content">
        <div class="header-title">
          <svg class="header-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20"/>
            <path d="M2 12h20"/>
          </svg>
          <div>
            <h1>Ask NASA</h1>
            <p class="header-subtitle">AI-powered NASA mission report search</p>
          </div>
        </div>
        <a href="/" class="back-link" title="Back to portfolio">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
      </div>
    </header>

    <!-- Messages -->
    <main class="chat-messages" id="messages">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20"/>
            <path d="M2 12h20"/>
          </svg>
        </div>
        <h2>Explore NASA Missions</h2>
        <p>Ask questions about Apollo, Voyager, Space Shuttle, Mars rovers, and more. Answers are generated from official NASA mission reports.</p>
        <div class="suggested-questions">
          <button class="suggestion" onclick="askSuggestion(this)">What went wrong on Apollo 13?</button>
          <button class="suggestion" onclick="askSuggestion(this)">How was the Hubble Space Telescope repaired?</button>
          <button class="suggestion" onclick="askSuggestion(this)">What did Voyager discover at Jupiter?</button>
          <button class="suggestion" onclick="askSuggestion(this)">Describe the first Space Shuttle mission</button>
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="chat-input-bar">
      <form class="input-form" id="chatForm" onsubmit="handleSubmit(event)">
        <input
          type="text"
          id="questionInput"
          placeholder="Ask about a NASA mission..."
          autocomplete="off"
          maxlength="500"
          required
        >
        <button type="submit" id="sendBtn" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
      <p class="input-disclaimer">Responses are AI-generated from NASA mission reports and may contain inaccuracies.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
